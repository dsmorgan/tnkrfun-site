<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Horse Breeder | tnkr.fun</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<style>
/* ── Reset & Base ────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:system-ui,'Segoe UI',Roboto,sans-serif;
  color:var(--text);background:var(--bg);
  overflow-x:hidden;
}

/* ── Design Tokens ───────────────────────────── */
:root{
  --bg:         #0d0d1a;
  --bg-card:    #161628;
  --bg-hover:   #1e1e3a;
  --bg-input:   #1a1a30;
  --text:       #E0E8FF;
  --text-muted: #8890a8;
  --accent:     #39ff14;
  --gold:       #ffd35c;
  --red:        #ff4444;
  --border:     rgba(255,255,255,.08);
  --radius:     8px;

  /* trait pill colors */
  --pill-speed:     74,158,255;
  --pill-stamina:   80,216,144;
  --pill-agility:   255,179,71;
  --pill-strength:  255,107,107;
  --pill-obedience: 180,122,255;
}

/* ── Typography ──────────────────────────────── */
.mono{font-family:'Courier New',monospace}
h1{font-size:1.1rem;font-weight:700;letter-spacing:.04em}
h2{font-size:1rem;font-weight:600;margin-bottom:.5em;color:var(--accent)}
h3{font-size:.9rem;font-weight:600;margin-bottom:.3em}

/* ── Header ──────────────────────────────────── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
body{padding-top:92px} /* compensate for fixed header+tabs */
.header h1{color:var(--accent);white-space:nowrap}
.header-stats{
  display:flex;gap:16px;font-size:.85rem;
  font-family:'Courier New',monospace;
  color:var(--text-muted);
}
.header-stats span{white-space:nowrap}
.header-stats .money{color:var(--gold)}
.header-stats .rep{color:var(--accent)}

/* reputation bar */
.rep-bar{
  display:inline-flex;align-items:center;gap:4px;
}
.rep-bar-track{
  width:60px;height:8px;background:rgba(255,255,255,.08);
  border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;
}
.rep-bar-fill{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.rep-title{
  display:inline-block;padding:1px 7px;border-radius:10px;
  font-family:'Courier New',monospace;font-size:.65rem;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--text-muted);background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  margin-left:4px;
}
.rep-title.tier-2{color:#7ec0ff;background:rgba(126,192,255,.1);border-color:rgba(126,192,255,.4)}
.rep-title.tier-3{color:#ffcc33;background:rgba(255,204,51,.1);border-color:rgba(255,204,51,.4)}
.rep-title.tier-4{color:#d8a0ff;background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.5)}

/* ── Tabs ────────────────────────────────────── */
.tabs{
  position:fixed;top:44px;left:0;right:0;z-index:100;
  display:flex;gap:2px;padding:0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab-btn{
  padding:8px 14px;font-size:.8rem;
  font-family:'Courier New',monospace;
  color:var(--text-muted);background:transparent;
  border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{display:none;padding:16px;min-height:calc(100vh - 140px)}
.tab-content.active{display:block}

/* ── Footer ──────────────────────────────────── */
.footer{
  position:sticky;bottom:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  font-size:.85rem;
}
.footer .event-log{
  flex:1;color:var(--text-muted);
  font-family:'Courier New',monospace;
  font-style:italic;font-size:.8rem;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.btn{
  padding:6px 14px;font-size:.8rem;
  font-family:'Courier New',monospace;
  border:1px solid;border-radius:var(--radius);
  cursor:pointer;transition:background .15s;
  text-transform:uppercase;letter-spacing:.04em;
}
.btn-primary{color:var(--accent);background:rgba(57,255,20,.08);border-color:rgba(57,255,20,.4)}
.btn-primary:hover{background:rgba(57,255,20,.18)}
.btn-gold{color:var(--gold);background:rgba(255,211,92,.08);border-color:rgba(255,211,92,.4)}
.btn-gold:hover{background:rgba(255,211,92,.18)}
.btn-danger{color:var(--red);background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3)}
.btn-danger:hover{background:rgba(255,68,68,.18)}
.btn-muted{color:var(--text-muted);background:rgba(255,255,255,.04);border-color:var(--border)}
.btn-muted:hover{background:rgba(255,255,255,.08)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Horse Card ──────────────────────────────── */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;
}
.horse-card{
  background:var(--bg-card);
  border:2px solid #2a2a44;
  border-left:4px solid #888;
  border-radius:var(--radius);
  padding:12px 14px;
  display:grid;
  grid-template-columns:80px 1fr;
  gap:12px;
  cursor:pointer;
  transition:background .15s,box-shadow .15s;
  position:relative;
}
.horse-card:hover{background:var(--bg-hover)}
.horse-card.expanded{
  grid-template-columns:1fr;
  cursor:default;
}

/* ── Rarity tiers (ported from Tinker Impact) ── */
.horse-card.rarity-common{}
.horse-card.rarity-rare{
  border-color:#ffcc33;
  box-shadow:0 0 14px rgba(255,204,51,.45), inset 0 0 8px rgba(255,204,51,.08);
}
.horse-card.rarity-epic{
  border-color:#a855f7;
  animation:horseCardPulsePurple 2.2s ease-in-out infinite;
}
@keyframes horseCardPulsePurple{
  0%,100%{box-shadow:0 0 12px rgba(168,85,247,.45), inset 0 0 8px rgba(168,85,247,.1)}
  50%   {box-shadow:0 0 28px rgba(216,160,255,.95), inset 0 0 16px rgba(216,160,255,.3)}
}

/* Rarity corner badge */
.rarity-badge{
  position:absolute;top:6px;right:8px;
  font-family:'Courier New',monospace;font-size:.7rem;letter-spacing:1px;
  pointer-events:none;z-index:2;
}
.rarity-badge.rarity-rare{color:#ffcc33;text-shadow:0 0 4px rgba(255,204,51,.8)}
.rarity-badge.rarity-epic{color:#d8a0ff;text-shadow:0 0 6px rgba(216,160,255,.9)}

/* Rarity label row inside expanded detail */
.rarity-row{
  font-family:'Courier New',monospace;font-size:.8rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  padding:3px 8px;border-radius:4px;
  align-self:flex-start;display:inline-block;
}
.rarity-row.rarity-rare{color:#ffcc33;background:rgba(255,204,51,.1);border:1px solid rgba(255,204,51,.4)}
.rarity-row.rarity-epic{color:#d8a0ff;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.5)}

/* Elite trait pill (Epic-only) */
.elite-trait{
  font-family:'Courier New',monospace;font-size:.75rem;
  padding:6px 10px;border-radius:4px;
  background:linear-gradient(90deg,rgba(168,85,247,.18),rgba(168,85,247,.05));
  border:1px solid rgba(168,85,247,.4);
  color:#e0e8ff;
}
.elite-trait strong{color:#d8a0ff;letter-spacing:.04em}
.lineage-gone{color:var(--text-muted);font-style:italic;opacity:.65;text-decoration:line-through;text-decoration-thickness:1px}

/* ── Sick horse indicator ───────────────────── */
.horse-card.horse-sick{
  border-color:rgba(255,68,68,.5)!important;
  box-shadow:inset 0 0 12px rgba(255,68,68,.12);
}
.horse-card.horse-sick .horse-portrait{filter:saturate(.5) brightness(.85)}
.sick-badge{
  position:absolute;top:6px;left:8px;
  font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;
  color:var(--red);
  background:rgba(255,68,68,.15);
  border:1px solid rgba(255,68,68,.5);
  padding:2px 8px;border-radius:8px;
  z-index:3;pointer-events:none;
  animation:sickPulse 2s ease-in-out infinite;
}
@keyframes sickPulse{
  0%,100%{box-shadow:0 0 4px rgba(255,68,68,.3)}
  50%    {box-shadow:0 0 12px rgba(255,68,68,.7)}
}

/* ── Rarity reveal animations ───────────────── */

/* Catch: rare gold border flash */
.catch-reveal-rare{
  animation:catchRareFlash .6s ease-out;
}
@keyframes catchRareFlash{
  0%  {box-shadow:0 0 0 0 rgba(255,204,51,.9);filter:brightness(1)}
  30% {box-shadow:0 0 30px 8px rgba(255,204,51,.9);filter:brightness(1.4) saturate(1.4)}
  100%{box-shadow:0 0 14px rgba(255,204,51,.45);filter:brightness(1)}
}

/* Catch: rare glow ring expanding from portrait */
.rare-glow-ring{
  position:absolute;top:50%;left:50%;
  width:30px;height:30px;border-radius:50%;
  border:3px solid #ffcc33;
  transform:translate(-50%,-50%) scale(.3);
  animation:rareGlowRing .7s ease-out forwards;
  pointer-events:none;z-index:4;
  box-shadow:0 0 14px rgba(255,204,51,.8);
}
@keyframes rareGlowRing{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:1;border-width:4px}
  100%{transform:translate(-50%,-50%) scale(3);opacity:0;border-width:1px}
}

/* Catch: epic screen dim overlay */
.catch-epic-dim{
  position:fixed;inset:0;pointer-events:none;z-index:300;
  background:rgba(0,0,0,.7);
  animation:catchEpicDim 1.8s ease-out forwards;
}
@keyframes catchEpicDim{
  0%  {opacity:0}
  15% {opacity:1}
  80% {opacity:1}
  100%{opacity:0}
}

/* Catch: epic purple shockwave */
.epic-shockwave{
  position:absolute;top:50%;left:50%;
  width:40px;height:40px;border-radius:50%;
  border:4px solid #d8a0ff;
  transform:translate(-50%,-50%) scale(.3);
  animation:epicShockwave 1s ease-out forwards;
  pointer-events:none;z-index:5;
  box-shadow:0 0 30px rgba(216,160,255,.95),0 0 60px rgba(168,85,247,.7);
}
@keyframes epicShockwave{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:1;border-width:5px}
  100%{transform:translate(-50%,-50%) scale(5);opacity:0;border-width:1px}
}

/* Epic text banner over catch/foal card */
.epic-rarity-text{
  position:absolute;top:30%;left:50%;
  transform:translate(-50%,-50%) scale(.3);
  font-family:'Courier New',monospace;
  font-size:1.8rem;font-weight:700;
  letter-spacing:.1em;
  pointer-events:none;z-index:6;
  white-space:nowrap;
  animation:epicTextPop 1.6s ease-out forwards;
}
.epic-rarity-text.rare{
  color:#ffcc33;font-size:1.3rem;
  text-shadow:0 0 10px rgba(255,204,51,.9),0 0 4px #000;
  animation:rareTextPop .9s ease-out forwards;
}
.epic-rarity-text.epic{
  color:#d8a0ff;
  text-shadow:0 0 14px rgba(216,160,255,1),0 0 6px rgba(168,85,247,.9),0 0 4px #000;
}
@keyframes rareTextPop{
  0%  {transform:translate(-50%,-50%) scale(.5);opacity:0}
  40% {transform:translate(-50%,-50%) scale(1.15);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}
@keyframes epicTextPop{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:0}
  25% {transform:translate(-50%,-50%) scale(1.3);opacity:1}
  50% {transform:translate(-50%,-50%) scale(.95);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Rarity confetti particles */
.rarity-confetti{
  position:absolute;top:50%;left:50%;
  width:6px;height:6px;border-radius:1px;
  pointer-events:none;z-index:5;
  opacity:1;
}

/* ── Stable: NEW ribbon + shimmer on new horses ── */
.horse-card .new-ribbon{
  position:absolute;top:6px;right:8px;
  font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;
  letter-spacing:.1em;color:#0d0d1a;
  background:var(--accent);
  padding:2px 8px;border-radius:8px;
  box-shadow:0 0 8px rgba(57,255,20,.6);
  z-index:3;pointer-events:none;
  animation:newRibbonPop .5s ease-out;
}
@keyframes newRibbonPop{
  0%  {transform:scale(.4) translateY(-10px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}

/* Shimmer sweep on new Rare/Epic horses in stable */
.horse-card.new-shimmer{overflow:hidden}
.horse-card.new-shimmer::after{
  content:'';
  position:absolute;top:0;left:-120%;
  width:60%;height:100%;
  background:linear-gradient(100deg,transparent 25%,rgba(255,255,255,.18) 45%,rgba(255,255,255,.35) 50%,rgba(255,255,255,.18) 55%,transparent 75%);
  transform:skewX(-18deg);
  animation:newShimmerSweep 2.8s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
@keyframes newShimmerSweep{
  0%,70%,100%{left:-120%}
  85%        {left:120%}
}

/* Foal birth: rare highlight in day summary */
.foal-birth-rare{
  border-left-color:#ffcc33!important;
  color:#ffcc33!important;
  box-shadow:0 0 12px rgba(255,204,51,.3);
  animation:foalBirthRareGlow 1.5s ease-out;
}
@keyframes foalBirthRareGlow{
  0%  {box-shadow:0 0 0 rgba(255,204,51,0)}
  40% {box-shadow:0 0 20px rgba(255,204,51,.6)}
  100%{box-shadow:0 0 12px rgba(255,204,51,.3)}
}

/* Foal birth: epic card in day summary — purple glow */
.foal-birth-epic{
  border-left-color:#d8a0ff!important;
  box-shadow:0 0 20px rgba(216,160,255,.6),inset 0 0 10px rgba(168,85,247,.15);
  animation:foalBirthEpicPulse 1.8s ease-in-out infinite;
}
@keyframes foalBirthEpicPulse{
  0%,100%{box-shadow:0 0 14px rgba(216,160,255,.5),inset 0 0 8px rgba(168,85,247,.1)}
  50%    {box-shadow:0 0 28px rgba(216,160,255,.9),inset 0 0 16px rgba(168,85,247,.3)}
}
.sex-badge{
  display:inline-block;
  padding:1px 7px;border-radius:10px;
  font-family:'Courier New',monospace;font-size:.68rem;font-weight:600;
  letter-spacing:.03em;text-transform:lowercase;
  vertical-align:baseline;
}
.sex-stallion{color:#7ec0ff;background:rgba(126,192,255,.12);border:1px solid rgba(126,192,255,.4)}
.sex-mare{color:#ff9ec4;background:rgba(255,158,196,.12);border:1px solid rgba(255,158,196,.4)}

/* Rarity pill (matches sex-badge sizing) */
.rarity-pill{
  display:inline-block;
  padding:1px 7px;border-radius:10px;
  font-family:'Courier New',monospace;font-size:.68rem;font-weight:600;
  letter-spacing:.03em;
  vertical-align:baseline;
}
.rarity-pill.rarity-rare{
  color:#ffcc33;background:rgba(255,204,51,.12);border:1px solid rgba(255,204,51,.5);
  box-shadow:0 0 6px rgba(255,204,51,.35);
}
.rarity-pill.rarity-epic{
  color:#d8a0ff;background:rgba(168,85,247,.14);border:1px solid rgba(168,85,247,.55);
  animation:rarityPillPulse 2s ease-in-out infinite;
}
@keyframes rarityPillPulse{
  0%,100%{box-shadow:0 0 5px rgba(168,85,247,.4)}
  50%   {box-shadow:0 0 12px rgba(216,160,255,.95)}
}

.horse-info{display:flex;flex-direction:column;gap:4px;min-width:0}
.horse-name{font-weight:600;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.horse-breed{font-size:.75rem;color:var(--text-muted)}
.horse-coat{font-size:.75rem;font-family:'Courier New',monospace;color:var(--gold)}
.horse-age{font-size:.7rem;color:var(--text-muted)}

/* trait pills */
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.pill{
  display:inline-block;padding:1px 7px;
  border-radius:10px;font-size:.65rem;
  font-family:'Courier New',monospace;
  line-height:1.6;
}
.pill-speed{background:rgba(var(--pill-speed),.12);color:rgb(var(--pill-speed));border:1px solid rgba(var(--pill-speed),.25)}
.pill-stamina{background:rgba(var(--pill-stamina),.12);color:rgb(var(--pill-stamina));border:1px solid rgba(var(--pill-stamina),.25)}
.pill-agility{background:rgba(var(--pill-agility),.12);color:rgb(var(--pill-agility));border:1px solid rgba(var(--pill-agility),.25)}
.pill-strength{background:rgba(var(--pill-strength),.12);color:rgb(var(--pill-strength));border:1px solid rgba(var(--pill-strength),.25)}
.pill-obedience{background:rgba(var(--pill-obedience),.12);color:rgb(var(--pill-obedience));border:1px solid rgba(var(--pill-obedience),.25)}

/* stat bars */
.stat-bars{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.stat-row{display:flex;align-items:center;gap:6px;font-size:.7rem}
.stat-label{width:28px;text-align:right;color:var(--text-muted);font-family:'Courier New',monospace;font-size:.6rem}
.stat-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .3s}
.stat-val{width:20px;font-family:'Courier New',monospace;font-size:.6rem;color:var(--text-muted)}

/* happiness */
.happiness{font-size:.7rem;color:var(--text-muted);margin-top:4px}
.happiness-icon{margin-right:2px}

/* expanded detail */
.horse-detail{
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
  font-size:.8rem;display:grid;gap:8px;
}
.horse-detail .lineage{color:var(--text-muted);font-size:.75rem}
.horse-detail .genotype{
  font-family:'Courier New',monospace;font-size:.7rem;
  color:var(--text-muted);background:rgba(255,255,255,.03);
  padding:6px 8px;border-radius:4px;
}
.horse-detail .actions{display:flex;gap:8px;margin-top:4px}

/* ── SVG Horse Portrait ──────────────────────── */
.horse-portrait{
  width:80px;height:80px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);
  border-radius:var(--radius);
  overflow:hidden;flex-shrink:0;
}
.horse-portrait svg{width:76px;height:76px}

/* ── Breed tab ───────────────────────────────── */
.breed-slots{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:12px;align-items:start;margin-bottom:16px;
}
.breed-slot{
  background:var(--bg-card);border-radius:var(--radius);
  padding:16px;text-align:center;min-height:140px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px dashed var(--border);cursor:pointer;
  transition:border-color .15s;
}
.breed-slot:hover{border-color:rgba(255,255,255,.2)}
.breed-slot.filled{border-style:solid;border-color:rgba(57,255,20,.3);cursor:default}
.breed-connector{
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;color:var(--text-muted);padding-top:40px;
}
.prediction-panel{
  background:var(--bg-card);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;
}
.nursery-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.nursery-card{
  background:var(--bg-card);border-radius:var(--radius);
  padding:12px 14px;border-left:4px solid var(--gold);
}
.progress-bar{
  height:8px;background:rgba(255,255,255,.06);border-radius:4px;
  overflow:hidden;margin-top:8px;
}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s}

/* ── Explore tab ─────────────────────────────── */
.biome-cards{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.biome-card{
  background:var(--bg-card);border-radius:var(--radius);
  padding:14px 18px;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,background .15s;
  min-width:140px;
}
.biome-card:hover{background:var(--bg-hover)}
.biome-card.selected{border-color:var(--accent)}
.biome-card.locked{opacity:.4;cursor:not-allowed}
.biome-name{font-weight:600;font-size:.9rem;margin-bottom:4px}
.biome-desc{font-size:.75rem;color:var(--text-muted)}

.encounter-panel{
  background:var(--bg-card);border-radius:var(--radius);
  padding:16px;text-align:center;
}

/* ── Market tab ──────────────────────────────── */
.buyer-cards{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;margin-bottom:16px;
}
.buyer-card{
  background:var(--bg-card);border-radius:var(--radius);
  padding:12px 14px;border-left:4px solid var(--gold);
}
.buyer-card.selected{border-color:var(--accent);background:var(--bg-hover)}
.buyer-name{font-weight:600;font-size:.85rem}
.buyer-request{font-size:.8rem;color:var(--text-muted);margin:6px 0}
.buyer-price{color:var(--gold);font-family:'Courier New',monospace;font-size:.85rem}
.buyer-timer{font-size:.7rem;color:var(--text-muted)}
.match-indicator{
  display:inline-block;font-size:.7rem;
  font-family:'Courier New',monospace;
  padding:1px 6px;border-radius:8px;
  background:rgba(57,255,20,.1);color:var(--accent);
}

/* ── Train tab ───────────────────────────────── */
.train-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.train-select{min-height:200px}
.train-panel{
  background:var(--bg-card);border-radius:var(--radius);
  padding:16px;
}
.train-options{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.train-option{
  background:var(--bg-input);border-radius:var(--radius);
  padding:10px 12px;cursor:pointer;
  border:1px solid transparent;transition:border-color .15s,background .15s;
  display:flex;justify-content:space-between;align-items:center;
}
.train-option:hover{background:var(--bg-hover);border-color:rgba(255,255,255,.1)}
.train-result{
  margin-top:12px;padding:12px;
  background:rgba(57,255,20,.05);border-radius:var(--radius);
  font-family:'Courier New',monospace;font-size:.85rem;
  color:var(--accent);
}

/* ── Upgrades tab ────────────────────────────── */
.upgrade-columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.upgrade-group h3{margin-bottom:8px;color:var(--accent)}
.upgrade-item{
  background:var(--bg-card);border-radius:var(--radius);
  padding:10px 12px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
}
.upgrade-item.owned{
  border-color:rgba(57,255,20,.4);
  background:rgba(57,255,20,.04);
}
.upgrade-item.owned .upgrade-name{color:var(--accent)}
.upgrade-item.owned .upgrade-desc{color:var(--accent)}
.upgrade-info{flex:1}
.upgrade-name{font-size:.85rem;font-weight:600}
.upgrade-desc{font-size:.7rem;color:var(--text-muted);margin-top:2px}
.upgrade-cost{font-family:'Courier New',monospace;font-size:.8rem;color:var(--gold);margin-left:8px}

/* ── Modal / Picker ──────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  max-width:500px;width:90vw;max-height:80vh;overflow-y:auto;
}
.modal h2{margin-bottom:12px}
.modal .horse-card{cursor:pointer}

/* ── Empty state ─────────────────────────────── */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--text-muted);font-size:.9rem;
}

/* ── Responsive ──────────────────────────────── */
@media(max-width:700px){
  .card-grid{grid-template-columns:1fr}
  .breed-slots{grid-template-columns:1fr;gap:8px}
  .breed-connector{padding-top:0;transform:rotate(90deg)}
  .train-layout{grid-template-columns:1fr}
  .header{padding:8px 12px;gap:8px}
  .header-stats{font-size:.75rem;gap:10px}
  .tab-btn{padding:6px 10px;font-size:.75rem}
  .tab-content{padding:12px}
}
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────── -->
<header class="header">
  <h1 class="mono">HORSE BREEDER</h1>
  <div class="header-stats">
    <span>Day <strong id="dayDisplay">1</strong></span>
    <span class="money">$<strong id="moneyDisplay">500</strong></span>
    <span class="rep">Rep <span class="rep-bar"><span class="rep-bar-track"><span class="rep-bar-fill" id="repFill" style="width:0%"></span></span></span> <strong id="repDisplay">0</strong> <span id="repTitle" class="rep-title">Hand</span></span>
    <span>Energy <strong id="energyDisplay">3/3</strong></span>
  </div>
</header>

<!-- ── Tabs ───────────────────────────────────── -->
<nav class="tabs" id="tabNav">
  <button class="tab-btn active" data-tab="stable">Stable</button>
  <button class="tab-btn" data-tab="breed">Breed</button>
  <button class="tab-btn" data-tab="train">Train</button>
  <button class="tab-btn" data-tab="care">Care</button>
  <button class="tab-btn" data-tab="explore">Explore</button>
  <button class="tab-btn" data-tab="market">Market</button>
  <button class="tab-btn" data-tab="upgrades">Upgrades</button>
</nav>

<!-- ── Tab Contents ──────────────────────────── -->
<main>
  <div class="tab-content active" id="tab-stable"></div>
  <div class="tab-content" id="tab-breed"></div>
  <div class="tab-content" id="tab-train"></div>
  <div class="tab-content" id="tab-care"></div>
  <div class="tab-content" id="tab-explore"></div>
  <div class="tab-content" id="tab-market"></div>
  <div class="tab-content" id="tab-upgrades"></div>
</main>

<!-- ── Footer ────────────────────────────────── -->
<footer class="footer">
  <button class="btn btn-primary" id="endDayBtn">End Day</button>
  <div class="event-log" id="eventLog">Your uncle left you a ranch, a questionable breeding license, and a horse named "Regret."</div>
  <button class="btn btn-danger" id="resetBtn" style="margin-left:auto;font-size:.7rem;padding:4px 10px;opacity:.6">Reset Game</button>
</footer>

<!-- ── Modal ──────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
