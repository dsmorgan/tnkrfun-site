  50%   {transform:translate(-50%,16px)}

.ufo--top{top:7vh;left:50%;z-index:20;}
.ufo--mid{top:70vh;left:20%;animation-delay:.7s;}
.ufo--low{top:78vh;left:80%;animation-delay:1.4s;}

.ufo:hover .beam{animation:beamPulse 2s ease-in-out infinite}
@keyframes beamPulse{0%,100%{opacity:0}50%{opacity:1}}

<!-- ── Star field (ASCII-only) ────────────────── -->
<canvas id="starfield"></canvas>
<script>
(() => {
  const N=300,R0=0.6,R1=1.8,TW=7000;
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  let stars=[];
  function resize(){
    c.width=innerWidth;c.height=innerHeight;
    stars=Array.from({length:N},()=>({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      r:R0+Math.random()*(R1-R0),
      phase:Math.random()*6.28318
    }));
  }
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const a=0.3+0.7*Math.abs(Math.sin((t+s.phase*1e3)/TW));
      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28318);ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();requestAnimationFrame(draw);
})();
</script>
