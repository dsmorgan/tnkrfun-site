<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tinker Impact | tnkr.fun</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:system-ui,'Segoe UI',Roboto,sans-serif;
  color:var(--text);background:var(--bg);
  overflow-x:hidden;
}

:root{
  --bg:         #0d0d1a;
  --bg-card:    #161628;
  --bg-hover:   #1e1e3a;
  --bg-input:   #1a1a30;
  --text:       #E0E8FF;
  --text-muted: #8890a8;
  --accent:     #39ff14;
  --gold:       #ffd35c;
  --red:        #ff4444;
  --hp:         #50d890;
  --border:     rgba(255,255,255,.08);
  --radius:     8px;

  --rarity-basic:  #9ca3af;
  --rarity-common: #3b82f6;
  --rarity-rare:   #ffcc33;
  --rarity-epic:   #a855f7;

  --class-knight: #c0a060;
  --class-mage:   #6ea0ff;
  --class-rogue:  #8b5cf6;
  --class-healer: #50d890;
}

/* ── Icon tint system ──
   Hero/enemy portraits are <div class="ti-icon"> with a CSS mask-image of
   the SVG silhouette. Background color is tinted by tier class. */
.ti-icon{
  width:64px;height:64px;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:center;mask-position:center;
  -webkit-mask-size:contain;mask-size:contain;
  background:#9ca3af;
}
/* Hero rarity tints */
.tint-basic{
  background:linear-gradient(180deg,#cfd5df 0%,#9ca3af 50%,#6b7280 100%);
}
.tint-common{
  background:linear-gradient(180deg,#7ec0ff 0%,#3b82f6 50%,#1d4ed8 100%);
  filter:drop-shadow(0 0 4px rgba(59,130,246,.55));
}
.tint-rare{
  background:linear-gradient(180deg,#fff2a8 0%,#ffcc33 45%,#ff9500 100%);
  filter:drop-shadow(0 0 6px rgba(255,200,40,.85)) drop-shadow(0 0 2px rgba(255,170,0,.5));
}
.tint-epic{
  background:linear-gradient(180deg,#e9b8ff 0%,#a855f7 50%,#6b21a8 100%);
  filter:drop-shadow(0 0 10px rgba(192,132,252,.9));
  animation:tintPulsePurple 1.6s ease-in-out infinite;
}
@keyframes tintPulseGold{
  0%,100%{filter:drop-shadow(0 0 4px rgba(255,170,0,.6))  drop-shadow(0 0 2px rgba(255,170,0,.4))}
  50%   {filter:drop-shadow(0 0 20px rgba(255,220,100,1)) drop-shadow(0 0 8px rgba(255,200,40,.8))}
}
@keyframes tintPulsePurple{
  0%,100%{filter:drop-shadow(0 0 5px rgba(150,70,230,.7))  drop-shadow(0 0 2px rgba(150,70,230,.5))}
  50%   {filter:drop-shadow(0 0 22px rgba(216,160,255,1)) drop-shadow(0 0 8px rgba(192,132,252,.9))}
}
/* Enemy type tints (A–G) */
.tint-A{background:linear-gradient(180deg,#bbf7a8 0%,#84cc16 50%,#4d7c0f 100%)}
.tint-B{background:linear-gradient(180deg,#86efac 0%,#22c55e 50%,#15803d 100%)}
.tint-C{
  background:linear-gradient(180deg,#5eead4 0%,#10b981 50%,#064e3b 100%);
  filter:drop-shadow(0 0 8px rgba(94,234,212,.9));
  animation:tintPulseGreen 2.2s ease-in-out infinite;
}
.tint-D{background:linear-gradient(180deg,#bae6fd 0%,#7dd3fc 50%,#0369a1 100%)}
.tint-E{background:linear-gradient(180deg,#7dd3fc 0%,#0ea5e9 50%,#075985 100%)}
.tint-F{
  background:linear-gradient(180deg,#60a5fa 0%,#1e40af 50%,#1e3a8a 100%);
  filter:drop-shadow(0 0 8px rgba(96,165,250,.9));
  animation:tintPulseDeepBlue 2s ease-in-out infinite;
}
.tint-G{
  background:linear-gradient(180deg,#fca5a5 0%,#ef4444 50%,#991b1b 100%);
  filter:drop-shadow(0 0 10px rgba(252,165,165,1));
  animation:tintPulseRed 1.2s ease-in-out infinite;
}
@keyframes tintPulseGreen{
  0%,100%{filter:drop-shadow(0 0 4px rgba(16,185,129,.55)) drop-shadow(0 0 2px rgba(16,185,129,.4))}
  50%   {filter:drop-shadow(0 0 18px rgba(94,234,212,1))   drop-shadow(0 0 7px rgba(94,234,212,.9))}
}
@keyframes tintPulseDeepBlue{
  0%,100%{filter:drop-shadow(0 0 5px rgba(30,64,175,.65))  drop-shadow(0 0 2px rgba(30,64,175,.4))}
  50%   {filter:drop-shadow(0 0 20px rgba(96,165,250,1))   drop-shadow(0 0 8px rgba(96,165,250,.9))}
}
@keyframes tintPulseRed{
  0%,100%{filter:drop-shadow(0 0 5px rgba(239,68,68,.7))   drop-shadow(0 0 2px rgba(239,68,68,.5))}
  50%   {filter:drop-shadow(0 0 22px rgba(252,165,165,1))  drop-shadow(0 0 10px rgba(239,68,68,.9))}
}

.mono{font-family:'Courier New',monospace}
h1{font-size:1.1rem;font-weight:700;letter-spacing:.04em}
h2{font-size:1rem;font-weight:600;margin-bottom:.5em;color:var(--accent)}
h3{font-size:.9rem;font-weight:600;margin-bottom:.3em}

/* Header */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  height:44px;
}
body{padding-top:79px} /* header (44) + tabs (~34) + 1px border */
main{margin:0;padding:0;display:block}
.header h1{color:var(--accent);white-space:nowrap}
.header-stats{
  display:flex;gap:16px;font-size:.85rem;
  font-family:'Courier New',monospace;
  color:var(--text-muted);
}
.header-stats span{white-space:nowrap}
.header-stats .gold{color:var(--gold)}
.header-stats .pulls{color:var(--accent)}

/* Tabs */
.tabs{
  position:fixed;top:44px;left:0;right:0;z-index:100;
  display:flex;gap:2px;padding:0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  height:34px;
}
.tab-btn{
  padding:8px 14px;font-size:.8rem;
  font-family:'Courier New',monospace;
  color:var(--text-muted);background:transparent;
  border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:disabled{opacity:.4;cursor:not-allowed}

.tab-content{display:none;padding:12px 16px 16px 16px;min-height:calc(100vh - 140px)}
.tab-content.active{display:block}
.tab-content > *:first-child{margin-top:0!important}

/* Footer */
.footer{
  position:sticky;bottom:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  font-size:.85rem;
}
.footer .event-log{
  flex:1;color:var(--text-muted);
  font-family:'Courier New',monospace;
  font-style:italic;font-size:.8rem;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}

/* Buttons */
.btn{
  padding:6px 14px;font-size:.8rem;
  font-family:'Courier New',monospace;
  border:1px solid;border-radius:var(--radius);
  cursor:pointer;transition:background .15s;
  text-transform:uppercase;letter-spacing:.04em;
  background:transparent;
}
.btn-primary{color:var(--accent);background:rgba(57,255,20,.08);border-color:rgba(57,255,20,.4)}
.btn-primary:hover{background:rgba(57,255,20,.18)}
.btn-gold{color:var(--gold);background:rgba(255,211,92,.08);border-color:rgba(255,211,92,.4)}
.btn-gold:hover{background:rgba(255,211,92,.18)}
.btn-danger{color:var(--red);background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3)}
.btn-danger:hover{background:rgba(255,68,68,.18)}
.btn-muted{color:var(--text-muted);background:rgba(255,255,255,.04);border-color:var(--border)}
.btn-muted:hover{background:rgba(255,255,255,.08)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Hero card */
.hero-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}
.hero-card{
  background:var(--bg-card);
  border-radius:var(--radius);
  border:2px solid var(--rarity-common);
  padding:10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
  transition:background .15s,transform .15s;
  position:relative;
}
.hero-card:hover{background:var(--bg-hover);transform:translateY(-2px)}
.hero-card.rarity-basic{border-color:var(--rarity-basic)}
.hero-card.rarity-common{border-color:var(--rarity-common);box-shadow:0 0 10px rgba(59,130,246,.35)}
.hero-card.rarity-rare{border-color:var(--rarity-rare)}
.hero-card.rarity-epic{border-color:var(--rarity-epic)}
.hero-card.rarity-rare:not(.locked){box-shadow:0 0 16px rgba(255,204,51,.55), inset 0 0 10px rgba(255,204,51,.15)}
.hero-card.rarity-epic:not(.locked){animation:cardPulsePurple 1.6s ease-in-out infinite}
.hero-card.locked .ti-icon{animation:none!important;filter:grayscale(1) brightness(.5)}
@keyframes cardPulseGold{
  0%,100%{box-shadow:0 0 8px rgba(255,179,0,.35), inset 0 0 6px rgba(255,179,0,.1)}
  50%   {box-shadow:0 0 24px rgba(255,220,100,.85), inset 0 0 14px rgba(255,220,100,.25)}
}
@keyframes cardPulsePurple{
  0%,100%{box-shadow:0 0 10px rgba(168,85,247,.4), inset 0 0 8px rgba(168,85,247,.12)}
  50%   {box-shadow:0 0 28px rgba(216,160,255,.9), inset 0 0 16px rgba(216,160,255,.3)}
}
.hero-card.locked{opacity:.35;filter:grayscale(1)}
.hero-card.selected{outline:2px solid var(--accent);outline-offset:2px}

.hero-portrait{
  width:64px;height:64px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,.04);
}
.hero-portrait svg{width:48px;height:48px}
.hero-portrait.class-knight{color:var(--class-knight)}
.hero-portrait.class-mage{color:var(--class-mage)}
.hero-portrait.class-rogue{color:var(--class-rogue)}
.hero-portrait.class-healer{color:var(--class-healer)}

.hero-name{font-weight:600;font-size:.85rem;text-align:center}
.hero-class{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.hero-stars{font-size:.7rem;letter-spacing:1px}
.hero-stars.rarity-basic{color:var(--rarity-basic)}
.hero-stars.rarity-common{color:var(--rarity-common)}
.hero-stars.rarity-rare{color:var(--rarity-rare)}
.hero-stars.rarity-epic{color:var(--rarity-epic)}
.hero-level{
  font-size:.65rem;font-family:'Courier New',monospace;
  color:var(--gold);
}
.hero-max{
  display:inline-block;margin-left:4px;
  font-size:.55rem;font-weight:700;
  color:var(--accent);
  padding:0 4px;border:1px solid rgba(57,255,20,.4);border-radius:3px;
  text-transform:uppercase;letter-spacing:.05em;
}
.hero-stats{
  width:100%;
  display:flex;flex-direction:column;gap:1px;
  font-family:'Courier New',monospace;
  font-size:.62rem;
  padding:4px 6px;
  background:rgba(0,0,0,.25);
  border-radius:3px;
  margin-top:2px;
}
.hero-stats .stat-row{
  display:grid;
  grid-template-columns:28px 34px 1fr;
  align-items:center;gap:6px;
  color:var(--text-muted);
}
.hero-stats .stat-k{color:var(--text-muted);letter-spacing:.05em}
.hero-stats .stat-v{color:var(--text);font-weight:600;text-align:right}
.hero-stats .stat-mult{color:var(--accent);font-weight:400;font-size:.55rem;text-align:left}
.hero-shards{font-size:.65rem;color:var(--text-muted);font-family:'Courier New',monospace}

/* Class sections (Team + Collection grouping) */
.class-section{
  margin-top:14px;
  padding:10px 12px 12px 12px;
  background:rgba(255,255,255,.015);
  border-radius:var(--radius);
}
.class-section-header{
  font-family:'Courier New',monospace;
  font-size:.85rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
.class-section-header:hover{filter:brightness(1.2)}
.class-section-header .class-count{
  font-size:.7rem;color:var(--text-muted);font-weight:400;
  margin-left:auto;
}
.class-section-header .class-caret{
  font-family:'Courier New',monospace;font-size:.75rem;
  color:var(--text-muted);
  transition:transform .2s;
  display:inline-block;width:12px;
}
.class-section.collapsed .class-caret{transform:rotate(-90deg)}
.class-section.collapsed .hero-grid{display:none}

/* Sticky Your Team header (stays visible while scrolling collection) */
/* Team tab uses a flex split: fixed top panel + scrollable collection below */
#tab-team.tab-content{
  display:none;
  padding:0;
  /* Take all viewport height below the fixed header bar */
  height:calc(100vh - 79px - 40px); /* 79 fixed bar, 40 footer */
  flex-direction:column;
  overflow:hidden;
}
#tab-team.tab-content.active{display:flex}
.team-sticky{
  flex-shrink:0;
  background:var(--bg);
  padding:12px 16px 10px 16px;
  border-bottom:1px solid var(--border);
  box-shadow:0 6px 12px -8px rgba(0,0,0,.6);
}
.team-sticky > h2{margin-top:0}
.team-sticky .passives-box{margin-top:14px;margin-bottom:0}
.team-collection-scroll{
  flex:1;
  overflow-y:auto;
  padding:10px 16px 16px 16px;
}

/* Team tab */
.team-slots{
  display:grid;
  gap:12px;margin-bottom:20px;
}
.team-slots.slots-3{grid-template-columns:repeat(3,1fr)}
.team-slots.slots-4{grid-template-columns:repeat(4,1fr)}
.team-slot.locked{opacity:.5;border-style:dashed;cursor:not-allowed}
.passives-box{
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:10px 14px;
  margin-bottom:20px;
  font-family:'Courier New',monospace;font-size:.72rem;
}
.passives-title{color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.passives-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:4px 14px;
  color:var(--text);
}
.team-slot{
  background:var(--bg-card);border-radius:var(--radius);
  padding:14px;text-align:center;min-height:160px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  border:2px dashed var(--border);cursor:pointer;
  transition:border-color .15s;
}
.team-slot:hover{border-color:rgba(255,255,255,.2)}
.team-slot.filled{border-style:solid;border-color:rgba(57,255,20,.3)}
.team-slot-empty{color:var(--text-muted);font-size:.8rem}

/* Summon tab */
.summon-panel{
  background:var(--bg-card);border-radius:var(--radius);
  padding:20px;text-align:center;margin-bottom:20px;
}
.summon-rates{
  font-size:.75rem;color:var(--text-muted);
  font-family:'Courier New',monospace;
  margin-top:12px;
}
.summon-buttons{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.summon-results{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;margin-top:20px;
}

/* Campaign tab */
.chapter{
  background:var(--bg-card);border-radius:var(--radius);
  padding:14px;margin-bottom:14px;
}
.chapter-name{font-weight:600;font-size:.95rem;margin-bottom:8px;color:var(--gold)}
.stage-list{display:flex;flex-wrap:wrap;gap:8px}
.stage-btn{
  padding:8px 12px;font-size:.75rem;
  font-family:'Courier New',monospace;
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);cursor:pointer;
  min-width:90px;
}
.stage-btn:hover:not(:disabled){background:var(--bg-hover);border-color:var(--accent)}
.stage-btn.cleared{color:var(--accent);border-color:rgba(57,255,20,.3)}
.stage-btn.current{border-color:var(--gold);box-shadow:0 0 8px rgba(255,211,92,.3)}
.stage-btn:disabled{opacity:.35;cursor:not-allowed}

/* Battle view */
.battle-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  z-index:200;
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
}
.battle-overlay.active{display:flex}
.battle-arena{
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:20px;
  width:100%;max-width:600px;
  display:flex;flex-direction:column;gap:14px;
  position:relative;
}
.battle-side{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
  gap:8px;
}
.battle-divider{
  text-align:center;color:var(--text-muted);
  font-family:'Courier New',monospace;font-size:.75rem;
}
.battle-unit{
  background:var(--bg-input);
  border-radius:var(--radius);
  padding:8px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;
  border:2px solid transparent;
  transition:transform .15s,border-color .15s,opacity .4s,filter .4s;
}
.battle-unit.active{border-color:var(--accent);transform:scale(1.05)}
.battle-unit.dead{opacity:.25;filter:grayscale(1) brightness(.5)}
/* Lunge: attacker leans toward their opponent */
.battle-unit.lunge-down{animation:unitLungeDown .22s ease-out}
.battle-unit.lunge-up{animation:unitLungeUp .22s ease-out}
@keyframes unitLungeDown{
  0%  {transform:scale(1.05) translateY(0)}
  50% {transform:scale(1.2) translateY(18px)}
  100%{transform:scale(1.05) translateY(0)}
}
@keyframes unitLungeUp{
  0%  {transform:scale(1.05) translateY(0)}
  50% {transform:scale(1.2) translateY(-18px)}
  100%{transform:scale(1.05) translateY(0)}
}
/* Flinch: target shakes + red flash */
.battle-unit.flinch{animation:unitFlinch .32s ease-out}
@keyframes unitFlinch{
  0%  {transform:translateX(0);           background:var(--bg-input)}
  15% {transform:translateX(-4px);        background:rgba(255,68,68,.4)}
  30% {transform:translateX(4px);         background:rgba(255,68,68,.5)}
  45% {transform:translateX(-3px);        background:rgba(255,68,68,.3)}
  60% {transform:translateX(3px);         background:rgba(255,68,68,.2)}
  80% {transform:translateX(-1px);        background:rgba(255,68,68,.1)}
  100%{transform:translateX(0);           background:var(--bg-input)}
}
/* Heal glow: target pulses green */
.battle-unit.heal-glow{animation:unitHealGlow .6s ease-out}
@keyframes unitHealGlow{
  0%  {box-shadow:0 0 0 0 rgba(80,216,144,0)}
  40% {box-shadow:0 0 18px 4px rgba(80,216,144,.9)}
  100%{box-shadow:0 0 0 0 rgba(80,216,144,0)}
}
/* Death fade */
.battle-unit.dying{animation:unitDying .6s ease-out forwards}
@keyframes unitDying{
  0%  {transform:scale(1);   filter:brightness(1)}
  30% {transform:scale(1.1); filter:brightness(2) saturate(2)}
  100%{transform:scale(.85); filter:grayscale(1) brightness(.4);opacity:.25}
}

/* ── Screen shake for big hits ── */
.battle-arena.shake-light{animation:arenaShakeLight .25s linear}
.battle-arena.shake-heavy{animation:arenaShakeHeavy .4s linear}
@keyframes arenaShakeLight{
  0%,100%{transform:translate(0,0)}
  25%    {transform:translate(-3px,-1px)}
  50%    {transform:translate(3px,1px)}
  75%    {transform:translate(-2px,2px)}
}
@keyframes arenaShakeHeavy{
  0%,100%{transform:translate(0,0)}
  10%    {transform:translate(-6px,-2px)}
  20%    {transform:translate(6px,2px)}
  30%    {transform:translate(-5px,3px)}
  45%    {transform:translate(5px,-3px)}
  60%    {transform:translate(-4px,2px)}
  80%    {transform:translate(3px,-1px)}
}

/* ── Class-specific attack effects (anchored to target or attacker) ── */
.fx-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fx{position:absolute;pointer-events:none}

/* Knight: shield impact ring grows out from target */
.fx-shield-ring{
  width:20px;height:20px;border-radius:50%;
  border:3px solid #c0a060;
  top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);
  animation:shieldRing .5s ease-out forwards;
}
@keyframes shieldRing{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:1;border-width:4px}
  100%{transform:translate(-50%,-50%) scale(2.8);opacity:0;border-width:1px}
}

/* Mage: glowing orb + expanding wave in element color */
.fx-mage-wave{
  width:20px;height:20px;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:mageWave .55s ease-out forwards;
}
.fx-mage-wave.fire{background:radial-gradient(circle,#ffb84d 0%,#ff5722 50%,transparent 70%);box-shadow:0 0 24px #ff7f00}
.fx-mage-wave.ice{background:radial-gradient(circle,#b0e8ff 0%,#3b82f6 50%,transparent 70%);box-shadow:0 0 24px #6ea0ff}
.fx-mage-wave.arcane{background:radial-gradient(circle,#d8a0ff 0%,#a855f7 50%,transparent 70%);box-shadow:0 0 24px #c084fc}
@keyframes mageWave{
  0%  {transform:translate(-50%,-50%) scale(.4);opacity:0}
  30% {transform:translate(-50%,-50%) scale(1.3);opacity:1}
  100%{transform:translate(-50%,-50%) scale(2.6);opacity:0}
}

/* Rogue: smoke puff + slash glyph */
.fx-smoke{
  width:40px;height:40px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(139,92,246,.8) 0%,rgba(100,100,100,.5) 40%,transparent 70%);
  border-radius:50%;
  animation:smokePuff .55s ease-out forwards;
  filter:blur(2px);
}
@keyframes smokePuff{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:1}
  40% {transform:translate(-50%,-50%) scale(1.2);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}
}
.fx-slash{
  width:32px;height:2px;
  top:50%;left:50%;
  background:linear-gradient(90deg,transparent 0%,#fff 50%,transparent 100%);
  transform:translate(-50%,-50%) rotate(-25deg) scaleX(0);
  transform-origin:center;
  box-shadow:0 0 8px #fff;
  animation:rogueSlash .35s ease-out .08s forwards;
}
@keyframes rogueSlash{
  0%  {transform:translate(-50%,-50%) rotate(-25deg) scaleX(0);opacity:0}
  30% {transform:translate(-50%,-50%) rotate(-25deg) scaleX(1);opacity:1}
  100%{transform:translate(-50%,-50%) rotate(-25deg) scaleX(1);opacity:0}
}

/* Healer: sparkle particles rising */
.fx-sparkle{
  width:4px;height:4px;border-radius:50%;
  background:#50d890;
  box-shadow:0 0 6px #50d890,0 0 10px rgba(80,216,144,.6);
  animation:healerSparkle .9s ease-out forwards;
}
@keyframes healerSparkle{
  0%  {transform:translateY(0) scale(.5);opacity:0}
  20% {transform:translateY(-6px) scale(1);opacity:1}
  100%{transform:translateY(-34px) scale(.3);opacity:0}
}

/* ── HP bar enhancements ── */
.hp-bar{position:relative}
.hp-ghost{
  position:absolute;top:0;left:0;height:100%;
  background:rgba(255,255,255,.35);
  border-radius:4px;
  transition:width .5s ease-out;
}
.hp-fill.critical{animation:hpCritical 1s ease-in-out infinite}
@keyframes hpCritical{
  0%,100%{filter:brightness(1)   drop-shadow(0 0 2px var(--red))}
  50%    {filter:brightness(1.5) drop-shadow(0 0 6px var(--red))}
}

/* ── Turn order indicator ── */
.turn-order{
  display:flex;gap:4px;align-items:center;
  justify-content:center;
  padding:6px 8px;
  background:rgba(0,0,0,.3);
  border-radius:var(--radius);
  margin-bottom:4px;
  min-height:36px;
  overflow:hidden;
}
.turn-order-label{font-family:'Courier New',monospace;font-size:.6rem;color:var(--text-muted);margin-right:4px;text-transform:uppercase;letter-spacing:.05em}
.turn-pip{
  width:28px;height:28px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:var(--bg-input);
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s ease, opacity .3s;
  flex-shrink:0;
}
.turn-pip.ally{border-color:var(--accent)}
.turn-pip.enemy{border-color:var(--red)}
.turn-pip.current{transform:scale(1.2);box-shadow:0 0 8px var(--accent)}
.turn-pip.enemy.current{box-shadow:0 0 8px var(--red)}
.turn-pip .ti-icon{width:18px;height:18px}

/* ── Action log (bottom 1-line) ── */
.battle-log{
  min-height:18px;
  padding:4px 8px;
  font-family:'Courier New',monospace;font-size:.7rem;
  color:var(--text-muted);
  text-align:center;
  background:rgba(0,0,0,.2);
  border-radius:4px;
  margin-top:4px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.battle-log.fresh{animation:logFade 1.5s ease-out}
@keyframes logFade{
  0%  {color:var(--text);transform:translateY(-2px)}
  100%{color:var(--text-muted);transform:translateY(0)}
}

/* ── Victory / Defeat sequence ── */
.battle-endscreen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  border-radius:var(--radius);
  animation:endscreenFade .6s ease-out forwards;
}
.battle-endscreen.victory{
  background:radial-gradient(circle,rgba(57,255,20,.25) 0%,rgba(57,255,20,.05) 50%,transparent 80%);
}
.battle-endscreen.defeat{
  background:radial-gradient(circle,rgba(255,68,68,.3) 0%,rgba(255,68,68,.1) 50%,transparent 80%);
  filter:saturate(.4);
}
@keyframes endscreenFade{
  0%  {opacity:0;backdrop-filter:blur(0)}
  100%{opacity:1;backdrop-filter:blur(2px)}
}
.battle-banner{
  font-family:'Courier New',monospace;font-size:2.4rem;font-weight:700;
  letter-spacing:.25em;
  padding:12px 40px;
  border-radius:var(--radius);
  pointer-events:auto;
}
.battle-banner.victory{
  color:#0d0d1a;background:var(--accent);
  text-shadow:none;
  box-shadow:0 0 40px rgba(57,255,20,.9),0 0 80px rgba(57,255,20,.5);
  animation:bannerVictorySlide .6s cubic-bezier(.2,1.6,.5,1) .2s backwards;
}
.battle-banner.defeat{
  color:#fff;background:var(--red);
  box-shadow:0 0 40px rgba(255,68,68,.8);
  animation:bannerDefeatShake .5s ease-out .2s backwards;
}
@keyframes bannerVictorySlide{
  0%  {transform:translateY(-80px) scale(.5);opacity:0}
  70% {transform:translateY(10px)  scale(1.1);opacity:1}
  100%{transform:translateY(0)     scale(1);opacity:1}
}
@keyframes bannerDefeatShake{
  0%  {transform:scale(.6);opacity:0}
  30% {transform:scale(1.15);opacity:1}
  40% {transform:translateX(-8px) scale(1.05)}
  55% {transform:translateX(8px)  scale(1.05)}
  70% {transform:translateX(-4px) scale(1.02)}
  85% {transform:translateX(4px)  scale(1.02)}
  100%{transform:translateX(0)    scale(1);opacity:1}
}
.battle-reward{
  font-family:'Courier New',monospace;
  color:var(--gold);font-size:1.1rem;font-weight:700;
  margin-top:14px;
  pointer-events:auto;
  animation:rewardCount .5s ease-out .6s backwards;
}
@keyframes rewardCount{
  0%  {opacity:0;transform:translateY(10px)}
  100%{opacity:1;transform:translateY(0)}
}
.battle-end-continue{
  margin-top:14px;pointer-events:auto;
  animation:rewardCount .5s ease-out 1s backwards;
}
.battle-unit .portrait{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.battle-unit .portrait svg{width:36px;height:36px}
.battle-unit .name{font-size:.7rem;font-weight:600;text-align:center;line-height:1.1}
.hp-bar{
  width:100%;height:8px;
  background:rgba(0,0,0,.4);
  border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
}
.hp-fill{
  height:100%;background:var(--hp);
  transition:width .3s;border-radius:4px;
}
.hp-fill.low{background:var(--red)}
.hp-text{font-size:.6rem;font-family:'Courier New',monospace;color:var(--text-muted)}

/* Floating damage numbers */
.float-num{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  font-family:'Courier New',monospace;
  font-weight:700;font-size:.95rem;
  pointer-events:none;
  animation:floatUp 1s ease-out forwards;
  text-shadow:0 0 4px #000,0 0 4px #000;
}
.float-num.dmg{color:var(--red)}
.float-num.heal{color:var(--hp)}
@keyframes floatUp{
  0%   {transform:translate(-50%,0);opacity:1}
  100% {transform:translate(-50%,-30px);opacity:0}
}

.battle-result{
  text-align:center;padding:14px;
  font-family:'Courier New',monospace;
}
.battle-result.victory{color:var(--accent)}
.battle-result.defeat{color:var(--red)}

/* ── Level-up attention + celebration ────────── */

/* Dim non-ready owned cards slightly so ready ones stand out */
.hero-card.dim-unready{filter:brightness(.78) saturate(.85)}

/* LV UP chip — inside top-right of a ready card (kept inside card bounds
   so it survives overflow:hidden from the shimmer sweep). */
.lvup-chip{
  position:absolute;top:6px;right:6px;
  font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;
  letter-spacing:.08em;
  background:linear-gradient(180deg,#fff2a8 0%,#ffcc33 50%,#ff9500 100%);
  color:#0d0d1a;
  padding:3px 9px;border-radius:10px;
  box-shadow:0 0 10px rgba(255,204,51,.8),0 0 22px rgba(255,204,51,.5);
  animation:lvupChipPulse 1.4s ease-in-out infinite;
  z-index:3;pointer-events:none;
}
@keyframes lvupChipPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 8px rgba(255,204,51,.65),0 0 18px rgba(255,204,51,.35)}
  50%    {transform:scale(1.12);box-shadow:0 0 14px rgba(255,220,100,1),0 0 28px rgba(255,220,100,.7)}
}

/* Glowing shard counter when \u22655 */
.hero-shards.ready{
  color:#ffcc33;font-weight:700;
  text-shadow:0 0 6px rgba(255,204,51,.7);
  animation:shardsReadyPulse 1.8s ease-in-out infinite;
}
@keyframes shardsReadyPulse{
  0%,100%{text-shadow:0 0 5px rgba(255,204,51,.55)}
  50%    {text-shadow:0 0 12px rgba(255,220,100,.95)}
}

/* Shimmer sweep (diagonal light streak) across ready cards.
   Keep overflow:hidden here — the LV UP chip lives inside the card bounds now. */
.hero-card.ready-shimmer{overflow:hidden}
.hero-card.ready-shimmer::after{
  content:'';
  position:absolute;top:0;left:-120%;
  width:60%;height:100%;
  background:linear-gradient(100deg,transparent 25%,rgba(255,255,255,.18) 45%,rgba(255,255,255,.35) 50%,rgba(255,255,255,.18) 55%,transparent 75%);
  transform:skewX(-18deg);
  animation:shimmerSweep 3.2s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
@keyframes shimmerSweep{
  0%,70%,100%{left:-120%}
  85%        {left:120%}
}

/* Tab badge — red count pill shown inline after the tab label.
   Kept inside the button bounds because .tabs uses overflow-x:auto. */
.tab-ready-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 5px;
  margin-left:6px;
  background:var(--red);color:#fff;
  font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;
  border-radius:10px;
  vertical-align:middle;
  box-shadow:0 0 6px rgba(255,68,68,.7);
  animation:tabBadgePulse 1.8s ease-in-out infinite;
}
@keyframes tabBadgePulse{
  0%,100%{transform:scale(1);   box-shadow:0 0 5px rgba(255,68,68,.55)}
  50%    {transform:scale(1.12);box-shadow:0 0 12px rgba(255,100,100,.95)}
}

/* ── Level-up celebration ───────────────────── */

/* Card zoom + flash on level up */
.hero-card.leveling{
  animation:cardLevelZoom 1.4s ease-out;
  z-index:5;
}
@keyframes cardLevelZoom{
  0%  {transform:scale(1);   filter:brightness(1)}
  15% {transform:scale(1.15);filter:brightness(2.2) saturate(1.6)}
  35% {transform:scale(1.08);filter:brightness(1.4)}
  100%{transform:scale(1);   filter:brightness(1)}
}

/* Expanding burst ring on level up (color varies by rarity) */
.lvup-ring{
  position:absolute;top:50%;left:50%;
  width:40px;height:40px;border-radius:50%;
  border:3px solid #ffcc33;
  transform:translate(-50%,-50%) scale(.4);
  animation:lvupRing 1s ease-out forwards;
  pointer-events:none;z-index:4;
}
.lvup-ring.common{border-color:#ffffff;box-shadow:0 0 12px rgba(255,255,255,.6)}
.lvup-ring.rare  {border-color:#ffcc33;box-shadow:0 0 16px rgba(255,204,51,.8)}
.lvup-ring.epic  {border-color:#d8a0ff;box-shadow:0 0 22px rgba(216,160,255,.95)}
@keyframes lvupRing{
  0%  {transform:translate(-50%,-50%) scale(.3);opacity:1;border-width:4px}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;border-width:1px}
}

/* +1 LEVEL floating text */
.lvup-text{
  position:absolute;top:30%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Courier New',monospace;
  font-size:1.2rem;font-weight:700;
  color:#ffcc33;
  text-shadow:0 0 8px rgba(255,204,51,.9),0 0 4px #000,0 2px 2px #000;
  pointer-events:none;
  animation:lvupTextFloat 1.4s ease-out forwards;
  z-index:6;
  white-space:nowrap;
}
@keyframes lvupTextFloat{
  0%  {transform:translate(-50%,-10%) scale(.5);opacity:0}
  25% {transform:translate(-50%,-35%) scale(1.3);opacity:1}
  70% {transform:translate(-50%,-55%) scale(1.1);opacity:1}
  100%{transform:translate(-50%,-75%) scale(1);  opacity:0}
}

/* Stat delta popups (HP +12 etc.) — staggered */
.lvup-delta{
  position:absolute;left:50%;top:55%;
  font-family:'Courier New',monospace;font-size:.75rem;font-weight:700;
  color:var(--hp);
  text-shadow:0 0 6px rgba(80,216,144,.8),0 1px 2px #000;
  transform:translate(-50%,0);
  pointer-events:none;
  animation:lvupDelta 1.2s ease-out forwards;
  z-index:6;white-space:nowrap;
}
@keyframes lvupDelta{
  0%  {transform:translate(-50%,10px) scale(.7);opacity:0}
  25% {transform:translate(-50%,0)    scale(1.1);opacity:1}
  75% {transform:translate(-50%,-18px)scale(1);  opacity:1}
  100%{transform:translate(-50%,-28px)scale(.9); opacity:0}
}

/* Level number flash when it bumps */
.hero-level.flash{animation:lvupLevelFlash .9s ease-out}
@keyframes lvupLevelFlash{
  0%  {transform:scale(1);  color:var(--gold)}
  30% {transform:scale(1.5);color:#fff;text-shadow:0 0 14px rgba(255,220,100,1)}
  100%{transform:scale(1);  color:var(--gold)}
}

/* Max-level confetti particles */
.lvup-confetti{
  position:absolute;top:50%;left:50%;
  width:6px;height:6px;
  border-radius:1px;
  pointer-events:none;z-index:5;
  animation:confettiFly 1.2s ease-out forwards;
}
@keyframes confettiFly{
  0%  {transform:translate(-50%,-50%) rotate(0)   scale(1);  opacity:1}
  100%{opacity:0}
}

/* ── Pull reveal overlay ────────────────────── */
.pull-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  z-index:400;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.pull-overlay.active{display:flex}

.pull-header{
  position:absolute;top:16px;right:20px;
  display:flex;gap:10px;align-items:center;
}
.pull-skip{
  font-family:'Courier New',monospace;font-size:.75rem;
  background:rgba(255,255,255,.05);color:var(--text-muted);
  border:1px solid var(--border);border-radius:4px;
  padding:6px 14px;cursor:pointer;
  text-transform:uppercase;letter-spacing:.05em;
}
.pull-skip:hover{color:var(--text);border-color:var(--text-muted)}

.pull-grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(120px,1fr));
  gap:12px;
  max-width:800px;
}
.pull-grid.count-1{grid-template-columns:minmax(200px,1fr)}
@media(max-width:700px){
  .pull-grid{grid-template-columns:repeat(2,1fr);gap:8px}
}

.pull-slot{
  background:var(--bg-card);
  border:2px solid #2a2a44;
  border-radius:var(--radius);
  padding:12px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-height:170px;
  position:relative;
  opacity:0;
  transform:scale(.6);
  transition:opacity .2s, transform .2s;
}
.pull-slot.rolling{
  opacity:1;transform:scale(1);
  animation:slotWiggle .08s linear infinite;
}
.pull-slot.revealed{
  opacity:1;transform:scale(1);
  animation:slotSnap .35s ease-out;
}
@keyframes slotWiggle{
  0%  {transform:translateY(-1px)}
  50% {transform:translateY(1px)}
  100%{transform:translateY(-1px)}
}
@keyframes slotSnap{
  0%  {transform:scale(1.15);filter:brightness(2)}
  60% {transform:scale(.95);filter:brightness(1.3)}
  100%{transform:scale(1);filter:brightness(1)}
}

/* Rarity-tiered reveal drama */
.pull-slot.reveal-rare{
  border-color:#ffcc33;
  box-shadow:0 0 18px rgba(255,204,51,.6), inset 0 0 10px rgba(255,204,51,.15);
  animation:slotSnap .35s ease-out, rareBurst .8s ease-out;
}
.pull-slot.reveal-epic{
  border-color:#a855f7;
  box-shadow:0 0 28px rgba(216,160,255,.9), inset 0 0 16px rgba(216,160,255,.3);
  animation:slotSnap .4s ease-out, epicBurst 1.2s ease-out;
}
@keyframes rareBurst{
  0%  {box-shadow:0 0 0 0 rgba(255,204,51,.9), 0 0 60px 40px rgba(255,204,51,.6)}
  100%{box-shadow:0 0 18px 0 rgba(255,204,51,.6), 0 0 0 0 rgba(255,204,51,0)}
}
@keyframes epicBurst{
  0%  {box-shadow:0 0 0 0 rgba(216,160,255,1), 0 0 100px 60px rgba(168,85,247,.8)}
  50% {box-shadow:0 0 40px 10px rgba(216,160,255,.9), 0 0 80px 40px rgba(168,85,247,.6)}
  100%{box-shadow:0 0 28px 0 rgba(216,160,255,.9), 0 0 0 0 rgba(168,85,247,0)}
}

.pull-slot .hero-name{font-size:.85rem;font-weight:600;text-align:center;margin-top:4px}
.pull-slot .hero-class{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.pull-slot .hero-stars{font-size:.75rem;letter-spacing:1px}
.pull-slot .hero-stars.rarity-common{color:var(--rarity-common)}
.pull-slot .hero-stars.rarity-rare{color:var(--rarity-rare)}
.pull-slot .hero-stars.rarity-epic{color:var(--rarity-epic)}

.pull-new-ribbon{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#0d0d1a;
  font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;
  letter-spacing:.1em;
  padding:2px 10px;border-radius:10px;
  box-shadow:0 0 10px rgba(57,255,20,.6);
  animation:ribbonIn .4s ease-out;
}
@keyframes ribbonIn{
  0%  {transform:translateX(-50%) translateY(-20px) scale(.5);opacity:0}
  100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
}
.pull-shard-note{
  font-family:'Courier New',monospace;font-size:.6rem;color:var(--text-muted);
}

/* Epic screen flash when an Epic reveals */
.epic-screen-flash{
  position:fixed;inset:0;pointer-events:none;z-index:401;
  background:radial-gradient(circle at center, rgba(216,160,255,.35) 0%, rgba(168,85,247,.15) 30%, transparent 60%);
  animation:epicScreenFlash .9s ease-out;
}
@keyframes epicScreenFlash{
  0%  {opacity:0}
  30% {opacity:1}
  100%{opacity:0}
}

/* Modal (for hero detail / pull results) */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  z-index:300;
  display:none;
  align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:20px;
  max-width:500px;width:100%;
  max-height:90vh;overflow-y:auto;
  border:1px solid var(--border);
}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

/* Tower */
.tower-panel{
  background:var(--bg-card);border-radius:var(--radius);
  padding:20px;text-align:center;
}
.tower-floor{
  font-size:1.4rem;color:var(--gold);
  font-family:'Courier New',monospace;margin:10px 0;
}

/* Mobile */
@media(max-width:700px){
  .hero-grid{grid-template-columns:1fr;gap:8px} /* single column for legibility */
  .team-slots.slots-3,.team-slots.slots-4{grid-template-columns:repeat(4,1fr);gap:4px}
  .team-slots{gap:4px}
  .passives-grid{grid-template-columns:1fr}
  /* Compact team slots so the sticky block doesn't eat the viewport */
  .team-slot{min-height:88px;padding:6px;gap:2px}
  .team-slot .hero-portrait{width:40px;height:40px}
  .team-slot .hero-portrait .ti-icon{width:32px;height:32px}
  .team-slot .hero-name{font-size:.7rem}
  .team-slot .hero-class{font-size:.55rem}
  .team-slot .hero-level{font-size:.6rem}
  .team-slot [data-clear-slot]{font-size:.55rem!important;padding:1px 4px!important;margin-top:2px!important}
  .team-slot-empty{font-size:.65rem}
  .team-sticky .team-sticky-hint{display:none}
  .team-sticky h2{font-size:.9rem;margin-bottom:4px}
  .team-sticky{padding:8px 12px}
  .team-collection-scroll{padding:8px 12px 12px 12px}
  .team-sticky .passives-box{margin-top:8px;font-size:.65rem}
  /* Account for smaller mobile fixed bar height */
  #tab-team.tab-content{height:calc(100vh - 79px - 40px)}
  .header{padding:8px 12px;gap:8px}
  .header-stats{font-size:.75rem;gap:10px}
  .tab-btn{padding:6px 10px;font-size:.75rem}
  .tab-content{padding:0 12px 12px 12px}
  .battle-side{gap:6px}
  .battle-unit{padding:6px}
}
</style>

<header class="header">
  <h1 class="mono">TINKER IMPACT</h1>
  <div class="header-stats">

    <span class="pulls">Pulls <strong id="pullsDisplay">0</strong></span>
    <span>Heroes <strong id="heroesDisplay">0/15</strong></span>
  </div>
</header>

<nav class="tabs" id="tabNav">
  <button class="tab-btn active" data-tab="team">Team</button>
  <button class="tab-btn" data-tab="summon">Summon</button>
  <button class="tab-btn" data-tab="campaign">Campaign</button>
  <button class="tab-btn" data-tab="tower" id="towerTabBtn" disabled>Tower</button>
  <button class="tab-btn" data-tab="collection">Collection</button>
</nav>

<main>
  <div class="tab-content active" id="tab-team"></div>
  <div class="tab-content" id="tab-summon"></div>
  <div class="tab-content" id="tab-campaign"></div>
  <div class="tab-content" id="tab-tower"></div>
  <div class="tab-content" id="tab-collection"></div>
</main>

<footer class="footer">
  <div class="event-log" id="eventLog">A wandering scribe hands you a summoning charter and three coppers. Best of luck.</div>

  <button class="btn btn-danger" id="resetBtn" style="font-size:.7rem;padding:4px 10px;opacity:.6">Reset</button>
</footer>

<!-- Battle overlay -->
<div class="battle-overlay" id="battleOverlay">
  <div class="battle-arena" id="battleArena"></div>
</div>

<!-- Pull reveal overlay -->
<div class="pull-overlay" id="pullOverlay">
  <div class="pull-header">
    <button class="pull-skip" id="pullSkipBtn">Skip</button>
  </div>
  <div class="pull-grid" id="pullGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
