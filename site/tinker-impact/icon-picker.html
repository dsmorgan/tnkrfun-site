<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tinker Impact — Icon Picker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, 'Segoe UI', sans-serif;
  background: #0d0d1a;
  color: #e0e8ff;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
h1 { color: #39ff14; font-size: 1.4rem; margin-bottom: 8px; }
h2 { color: #ffb300; font-size: 1.1rem; margin: 24px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 4px; }
p.intro { color: #8890a8; font-size: .85rem; line-height: 1.5; margin-bottom: 12px; }
a { color: #6ea0ff; }

.controls {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 10px 14px; background: #161628; border-radius: 6px;
  margin-bottom: 14px; font-size: .8rem;
}
.controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #8890a8; }
.controls select, .controls input[type=text] {
  background: #0d0d1a; border: 1px solid #2a2a44; color: #e0e8ff;
  font-family: 'Courier New', monospace; font-size: .75rem;
  padding: 4px 8px; border-radius: 4px;
}

.toc {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  padding: 10px; background: #161628; border-radius: 6px;
}
.toc a {
  font-family: 'Courier New', monospace;
  font-size: .72rem;
  color: #6ea0ff;
  text-decoration: none;
  padding: 3px 8px;
  border: 1px solid #2a2a44;
  border-radius: 4px;
}
.toc a:hover { border-color: #6ea0ff; background: #1e1e3a; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.card {
  background: #161628;
  border: 1px solid #2a2a44;
  border-radius: 6px;
  padding: 10px 10px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  position: relative;
}
.card:hover { border-color: #39ff14; transform: translateY(-1px); }
.card.flash { border-color: #39ff14; background: #1a2a18; }

.row {
  display: flex; justify-content: center; gap: 10px; margin-bottom: 8px;
  min-height: 56px; align-items: center;
}
.icon {
  width: 52px; height: 52px;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-size: contain; mask-size: contain;
}
.icon.c {
  background: linear-gradient(180deg, #cfd5df 0%, #9ca3af 50%, #6b7280 100%);
}
.icon.r {
  background: linear-gradient(180deg, #7ec0ff 0%, #3b82f6 50%, #1d4ed8 100%);
  filter: drop-shadow(0 0 4px rgba(59,130,246,.55));
}
.icon.e {
  background: linear-gradient(180deg, #fff2a8 0%, #ffcc33 45%, #ff9500 100%);
  filter: drop-shadow(0 0 6px rgba(255,179,0,.65));
  animation: epicPulse 3s ease-in-out infinite;
}
@keyframes epicPulse {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(255,179,0,.55)); }
  50%      { filter: drop-shadow(0 0 12px rgba(255,204,51,.9)); }
}

.slug {
  font-family: 'Courier New', monospace;
  font-size: .72rem;
  color: #e0e8ff;
  word-break: break-all;
  margin-bottom: 6px;
}
.links {
  display: flex; gap: 8px; justify-content: center;
  font-family: 'Courier New', monospace; font-size: .65rem;
}
.links a {
  color: #8890a8;
  text-decoration: none;
  padding: 2px 6px;
  border: 1px solid #2a2a44;
  border-radius: 3px;
}
.links a:hover { color: #39ff14; border-color: #39ff14; }

.copied-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #39ff14; color: #0d0d1a;
  font-family: 'Courier New', monospace; font-weight: 700; font-size: .9rem;
  padding: 10px 18px; border-radius: 6px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  z-index: 100;
}
.copied-toast.show { opacity: 1; }

/* Tint filter modes */
body.mode-common .icon.r, body.mode-common .icon.e,
body.mode-rare   .icon.c, body.mode-rare   .icon.e,
body.mode-epic   .icon.c, body.mode-epic   .icon.r { display: none; }
</style>
</head>
<body>

<h1>Tinker Impact — Icon Picker</h1>
<p class="intro">
  Every candidate silhouette from <a href="https://game-icons.net">game-icons.net</a>,
  grouped by role. <strong>Click any card</strong> to copy its slug. Each card also has
  <code style="color:#ffb300">preview</code> and <code style="color:#ffb300">svg</code>
  links that open in a new tab. Paste the slug into
  <code style="color:#ffb300">ICONS.md</code> to lock it in.
</p>

<div class="controls">
  <label>Show tint:
    <select id="tintMode">
      <option value="all">All three (C / R / E)</option>
      <option value="common">Common only</option>
      <option value="rare">Rare only</option>
      <option value="epic">Epic only</option>
    </select>
  </label>
  <label>Filter by text:
    <input type="text" id="filterInput" placeholder="e.g. knight, wolf, sword">
  </label>
</div>

<div class="toc" id="toc"></div>

<div id="content"></div>

<div class="copied-toast" id="toast"></div>

<script>
const POOLS = {
  'Heroes — Knights (Tank)': [
    'delapouite/barbarian','delapouite/caveman','delapouite/dwarf-face','delapouite/viking-head',
    'delapouite/spartan-helmet','delapouite/samurai-helmet','delapouite/viking-helmet',
    'delapouite/black-knight-helm','delapouite/centurion-helmet','delapouite/sun-priest',
    'delapouite/champions','delapouite/templar-shield','lorc/heavy-helm','lorc/visored-helm',
    'lorc/crested-helmet','lorc/closed-barbute','lorc/cultist','lorc/spartan','lorc/bowman',
  ],
  'Heroes — Mages (AoE DPS)': [
    'delapouite/wizard-face','delapouite/warlock-hood','delapouite/warlock-eye',
    'delapouite/woman-elf-face','delapouite/fire-spell-cast','delapouite/ice-spell-cast',
    'delapouite/bolt-spell-cast','delapouite/spell-book','delapouite/magic-hat',
    'lorc/robe','lorc/pointy-hat','lorc/witch-flight','lorc/wizard-staff','lorc/cultist',
    'lorc/pyromaniac','lorc/triple-needle','lorc/crystal-wand','lorc/rune-stone',
  ],
  'Heroes — Rogues (Speed / Burst)': [
    'delapouite/bandit','delapouite/fencer','delapouite/hoodie','delapouite/ninja-armor',
    'delapouite/walking-scout','lorc/hood','lorc/rogue','lorc/ninja-mask','lorc/hooded-assassin',
    'lorc/hooded-figure','lorc/assassin-pocket','lorc/daggers','lorc/running-ninja',
    'lorc/thief','lorc/smoke-bomb',
  ],
  'Heroes — Healers (Support)': [
    'delapouite/monk-face','delapouite/sun-priest','delapouite/hunter-eyes','delapouite/archer',
    'delapouite/pope-crown','delapouite/oak-leaf','delapouite/candles','delapouite/praying-mantis',
    'delapouite/holy-hand-grenade','lorc/prayer','lorc/robe','lorc/holy-symbol','lorc/holy-grail',
    'lorc/angel-outfit','lorc/candle-holder','lorc/candle-light',
  ],
  'Enemies — Goblins / Orcs': [
    'delapouite/goblin-head','delapouite/orc-head','delapouite/troglodyte','delapouite/caveman',
    'lorc/imp','lorc/imp-laugh','delapouite/goblin-camp',
  ],
  'Enemies — Spiders / Bugs': [
    'delapouite/spider-eye','delapouite/spider-mask','delapouite/spider-bot','lorc/spider-web',
    'lorc/mite','lorc/scorpion','lorc/scorpion-tail','lorc/insect-jaws','lorc/beetle-shell',
    'delapouite/ant','delapouite/ants',
  ],
  'Enemies — Wolves / Bears / Big Cats': [
    'lorc/wolf-head','lorc/wolf-howl','lorc/wolf-trap','delapouite/bear-head',
    'delapouite/tiger-head','delapouite/tiger','delapouite/saber-toothed-cat-head',
    'lorc/saber-tooth','lorc/lion','lorc/cat',
  ],
  'Enemies — Giants / Yetis / Golems': [
    'delapouite/giant','delapouite/ogre','delapouite/golem-head','lorc/cyclops','lorc/snowman',
    'delapouite/metal-golem-head','delapouite/mecha-head',
  ],
  'Enemies — Ghosts / Wraiths / Undead': [
    'lorc/ghost','lorc/spectre','lorc/grim-reaper','lorc/reaper-scythe','lorc/shadow-follower',
    'lorc/shadow-grasp','lorc/ghost-ally','delapouite/mummy-head','delapouite/skull-staff',
    'delapouite/soul','delapouite/soul-vessel','lorc/skull-mask','lorc/burning-skull',
  ],
  'Enemies — Demons / Evil': [
    'delapouite/devil-mask','delapouite/hell-crosses','lorc/imp','lorc/evil-eyes',
    'lorc/crowned-skull','lorc/skull-signet',
  ],
  'Weapons — Swords': [
    'delapouite/ancient-sword','delapouite/two-handed-sword','delapouite/katana','delapouite/axe-sword',
    'lorc/sword-hilt','lorc/sword-in-stone','lorc/sword-spin','lorc/broadsword','lorc/plain-dagger',
    'delapouite/dagger-rose','lorc/daggers',
  ],
  'Weapons — Axes / Hammers / Blunt': [
    'delapouite/war-axe','delapouite/warhammer','delapouite/flail','delapouite/flanged-mace',
    'delapouite/bone-mace','delapouite/thor-hammer','delapouite/battle-axe','lorc/axe-swing',
    'lorc/mace-head','lorc/halberd','delapouite/glaive','delapouite/sharp-halberd',
  ],
  'Weapons — Bows / Ranged / Staves': [
    'delapouite/bow-arrow','delapouite/crossbow','lorc/bow-arrow','lorc/wizard-staff',
    'delapouite/crescent-staff','delapouite/skull-staff','delapouite/sling','delapouite/slingshot',
    'delapouite/spear-feather','lorc/spear-hook','delapouite/lunar-wand','lorc/crystal-wand',
  ],
  'Shields': [
    'delapouite/templar-shield','delapouite/spiked-shield','delapouite/dragon-shield',
    'delapouite/griffin-shield','delapouite/viking-shield','delapouite/roman-shield',
    'delapouite/tribal-shield','delapouite/healing-shield','delapouite/heart-shield',
    'lorc/winged-shield','lorc/fire-shield','lorc/ice-shield','lorc/lightning-shield',
    'lorc/magic-shield','lorc/skull-shield','lorc/bordered-shield',
  ],
  'Gems / Crystals / Orbs': [
    'lorc/cut-diamond','lorc/emerald','lorc/gems','lorc/gem-pendant','lorc/gem-necklace',
    'lorc/crystal-cluster','lorc/crystal-ball','lorc/crystal-shine','lorc/crystal-growth',
    'lorc/crystal-eye','lorc/orbital','delapouite/fire-gem','delapouite/dragon-orb',
    'delapouite/crystal-shrine','delapouite/diamond-ring','delapouite/diamond-trophy',
  ],
  'Potions / Flasks': [
    'delapouite/health-potion','delapouite/magic-potion','lorc/round-bottom-flask',
    'lorc/potion-ball','lorc/bottle-vapors','lorc/bottled-bolt','delapouite/bottled-shadow',
    'delapouite/water-flask','lorc/standing-potion',
  ],
  'Spells / Effects': [
    'delapouite/fire-spell-cast','delapouite/ice-spell-cast','delapouite/bolt-spell-cast',
    'delapouite/fire-gem','delapouite/dragon-orb','delapouite/crystal-shrine','lorc/fire-zone',
    'lorc/ice-bolt','lorc/frostfire','lorc/focused-lightning','delapouite/lightning-dome',
    'delapouite/sparkles','lorc/comet-spark','lorc/arcing-bolt',
  ],
};

const CDN = 'https://cdn.jsdelivr.net/gh/game-icons/icons@master/';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 1500);
}

function copySlug(card, slug) {
  navigator.clipboard.writeText(slug);
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 600);
  showToast('copied  ' + slug);
}

function makeCard(slug) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.slug = slug;
  card.title = 'Click to copy slug';

  const row = document.createElement('div');
  row.className = 'row';
  ['c','r','e'].forEach(tier => {
    const icon = document.createElement('div');
    icon.className = `icon ${tier}`;
    icon.style.webkitMaskImage = `url(${CDN}${slug}.svg)`;
    icon.style.maskImage = `url(${CDN}${slug}.svg)`;
    row.appendChild(icon);
  });
  card.appendChild(row);

  const slugEl = document.createElement('div');
  slugEl.className = 'slug';
  slugEl.textContent = slug;
  card.appendChild(slugEl);

  const links = document.createElement('div');
  links.className = 'links';
  const previewA = document.createElement('a');
  previewA.href = `https://game-icons.net/1x1/${slug}.html`;
  previewA.target = '_blank';
  previewA.rel = 'noopener';
  previewA.textContent = 'preview';
  previewA.onclick = e => e.stopPropagation();
  const svgA = document.createElement('a');
  svgA.href = `${CDN}${slug}.svg`;
  svgA.target = '_blank';
  svgA.rel = 'noopener';
  svgA.textContent = 'svg';
  svgA.onclick = e => e.stopPropagation();
  links.appendChild(previewA);
  links.appendChild(svgA);
  card.appendChild(links);

  card.addEventListener('click', () => copySlug(card, slug));
  return card;
}

function render() {
  const content = document.getElementById('content');
  const toc = document.getElementById('toc');
  Object.entries(POOLS).forEach(([section, slugs]) => {
    const anchor = section.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const link = document.createElement('a');
    link.href = '#' + anchor;
    link.textContent = section.split('—').pop().trim();
    toc.appendChild(link);

    const h2 = document.createElement('h2');
    h2.id = anchor;
    h2.textContent = section;
    content.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.dataset.section = section;
    slugs.forEach(slug => grid.appendChild(makeCard(slug)));
    content.appendChild(grid);
  });
}

render();

// Controls
document.getElementById('tintMode').addEventListener('change', e => {
  const v = e.target.value;
  document.body.classList.remove('mode-common','mode-rare','mode-epic');
  if (v !== 'all') document.body.classList.add(`mode-${v}`);
});

document.getElementById('filterInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = (!q || c.dataset.slug.toLowerCase().includes(q)) ? '' : 'none';
  });
  // Hide empty section headers
  document.querySelectorAll('.grid').forEach(g => {
    const anyVisible = [...g.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    const h2 = g.previousElementSibling;
    if (h2 && h2.tagName === 'H2') h2.style.display = anyVisible ? '' : 'none';
    g.style.display = anyVisible ? '' : 'none';
  });
});
</script>
</body>
</html>
