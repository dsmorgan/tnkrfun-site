name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'district11/**'
      - 'nginx/**'
      - 'Dockerfile'
      - '.github/workflows/ci.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push manifest changes
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update manifests with new image tag
        run: |
          # Extract the first SHA-based tag from docker/metadata-action
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | grep 'sha-' | head -n 1)
          echo "Using SHA_TAG=$SHA_TAG"
          sed -i "s#image: ghcr.io/${{ github.repository }}:.*#image: ${SHA_TAG}#" manifests/tnkrfun-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/tnkrfun-deployment.yaml
          git commit -m "ci: update deployment to ${SHA_TAG}" || echo "No changes to commit"
          git push
