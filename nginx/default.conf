# Host-based routing:
#   - district11.net (+ www) -> the District 11 site
#   - everything else (tnkr.fun, direct IP, any other domain) -> the tnkrfun alien site
#
# NOTE: match district11.net exactly — do NOT wildcard (*.district11.net),
# because tnkrfun.k3s0.apex.district11.net must still fall through to the
# default tnkrfun server block.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name district11.net www.district11.net;

    root /usr/share/nginx/district11;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
